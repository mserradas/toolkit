# FORMATO

format = """\
($directory)\
$git_branch\
$git_status\
$fill\
$python\
$nodejs\
$rust\
$golang\
$php\
$bun\
$java\
$c\
$conda\
$zig\
$cmd_duration\
\n$character\
"""

add_newline = true
command_timeout = 2000

[fill]
symbol = ' '

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✖](bold red)"

[directory]
format = "[$path](bold $style)[$read_only]($read_only_style) "
truncation_length = 2
style = "blue"
read_only_style = "blue"
before_repo_root_style = "blue"
truncation_symbol = "…/"
truncate_to_repo = true
read_only = " 🔒"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[cmd_duration]
format = " ⏱ took [ $duration]($style) "
style = "bold yellow"
min_time = 500

[git_branch]
format = "-> [$symbol$branch]($style) "
style = "bold green"
symbol = " "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"

stashed = "≡"
untracked = "?"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"
conflicted = "="

ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""

# --- LENGUAJES Y ENTORNOS ---

[python]
symbol = "🐍 "
style = "bold yellow"
detect_files = [
	"uv.lock",
	"pyproject.toml",
	"requirements.txt",
	".python-version",
]
format = '[${symbol}${version}( \($virtualenv\))]($style)'

[bun]
version_format = "$raw"
format = '[$symbol$version]($style)'
symbol = "🥟 "

[nodejs]
symbol = " "
style = "bold green"
detect_files = ["package.json", ".node-version"]
detect_extensions = ["js", "mjs", "cjs", "ts"]
format = '[${symbol}${version}]($style)'

[rust]
symbol = "🦀 "
format = '[$symbol$version](bold red)'

[golang]
symbol = "🐹 "
style = "bold cyan"
format = '[$symbol$version]($style)'

[php]
symbol = "🐘 "
style = "bold blue"
format = '[$symbol$version]($style)'

[java]
symbol = "☕ "
style = "bold red"
format = '[$symbol$version]($style)'

[c]
symbol = "© "
style = "bold blue"
format = '[$symbol$version]($style)'

[zig]
symbol = "⚡ "
style = "bold yellow"
format = '[$symbol$version]($style)'

[conda]
symbol = "🅒 "
style = "bold green"
format = '[$symbol$environment]($style)'

